schema_version: "1.0"
kind: "skill"
id: "skill:uc.tag-taxonomy-design"
version: "0.1.0"
title: "Design a Unity Catalog tag taxonomy"
owner: "team:platform-foundations"
signing_key_id: "uc:secrets:bv/skill-uc-tag-taxonomy"

exemplar_of: "meta:row-column-security/ext:design-domain-taxonomy"  # v0.7.7 N175 - parent extension in <bv>.capability_graph (section 23.2.6)
orchestration:
  kind: "llm_with_tools"
  model_role: "skill_runtime_premium"
  max_turns: 8
  system_prompt_sections:
    - id: "role"
      altitude: "high"
      summary: "You design a UC tag taxonomy (tag keys + allowed value sets) given an organisational intent."
    - id: "constraints"
      altitude: "medium"
      summary: |
        Cite evidence claim_ids for existing tags.
        Never recommend a taxonomy that conflicts with existing widely-applied tags without an explicit migration plan.
    - id: "output_schema"
      altitude: "low"
      summary: "Emit `taxonomy` matching the declared output schema, strict mode."
  tool_pool:
    - "tool:uc.list_tags_full"
    - "tool:kg.query_beliefs"
  behavior_constraints:
    must_emit_evidence_chain: true
    must_surface_risk_flags: true

requires:
  uc_permissions:
    - "USE METASTORE"
    - "SELECT on system.information_schema.*"
  system_schemas:
    - "system.information_schema"
  tools:
    - "tool:uc.list_tags_full"
    - "tool:kg.query_beliefs"
  skills: []
  model_role: "skill_runtime_premium"
  budget:
    max_context_tokens: 20000
    max_total_input_tokens: 36000
    max_total_output_tokens: 6000
    max_tool_calls: 15
    max_wallclock_sec: 60
  constitutional:
    - "no.write.to.uc"
    - "must.emit.evidence.chain"

inputs:
  - name: "intent"
    type: "string"
    required: true

outputs:
  - name: "taxonomy"
    type: "object"

eval:
  suite: "evals/"
  required_pass_rate: 0.85
  golden_dataset: "uc:brickvision.evals.uc_tag_taxonomy_v0_1"
  scorers:
    - "Correctness"
    - "Guidelines:must-cite-evidence"
    - "RetrievalGroundedness"
    - "Safety"

execution:
  runtime: "serverless"
