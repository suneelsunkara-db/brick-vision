schema_version: "1.0"
kind: "skill"
id: "skill:uc.grant-recommend"
version: "0.1.0"
title: "Recommend least-privilege Unity Catalog grants"
owner: "team:platform-foundations"
signing_key_id: "uc:secrets:bv/skill-uc-grant-rec"

exemplar_of: "meta:identity-and-access/ext:recommend-minimum-grants"  # v0.7.7 N175 - parent extension in <bv>.capability_graph (section 23.2.6)
orchestration:
  kind: "llm_with_tools"
  model_role: "skill_runtime_premium"
  max_turns: 8
  system_prompt_sections:
    - id: "role"
      altitude: "high"
      summary: "You recommend least-privilege UC grants given an intent and a target principal."
    - id: "constraints"
      altitude: "medium"
      summary: |
        Cite evidence claim_ids for every recommended grant.
        Surface risk flags. Never recommend metastore-admin or account-admin grants.
        Never invent securables that don't exist in retrieved Beliefs.
    - id: "output_schema"
      altitude: "low"
      summary: "Emit `recommendation` matching the declared output JSON schema, strict mode."
  tool_pool:
    - "tool:uc.list_grants_for_securable"
    - "tool:uc.list_grants_for_principal"
    - "tool:uc.resolve_principal"
    - "tool:kg.query_beliefs"
    - "tool:kg.emit_claims"
  behavior_constraints:
    must_emit_evidence_chain: true
    must_surface_risk_flags: true
    no_recommend_account_admin: true
    no_recommend_metastore_admin: true

requires:
  uc_permissions:
    - "USE CATALOG on the target catalog"
    - "SELECT on system.information_schema.*"
  system_schemas:
    - "system.information_schema"
  tools:
    - "tool:uc.list_grants_for_securable"
    - "tool:uc.list_grants_for_principal"
    - "tool:uc.resolve_principal"
    - "tool:kg.query_beliefs"
    - "tool:kg.emit_claims"
  skills:
    - "skill:uc.grant-introspect@>=0.1"
  model_role: "skill_runtime_premium"
  budget:
    max_context_tokens: 24000
    max_total_input_tokens: 42000
    max_total_output_tokens: 8000
    max_tool_calls: 20
    max_wallclock_sec: 60
  constitutional:
    - "no.write.to.uc"
    - "must.emit.evidence.chain"
    - "must.surface.risk.flags"
    - "no.recommend.account.admin.grants"
    - "no.recommend.metastore.admin.grants"

inputs:
  - name: "intent"
    type: "string"
    required: true
  - name: "principal"
    type: "string"
    required: true
  - name: "scope_constraints"
    type: "object"
    required: false

outputs:
  - name: "recommendation"
    type: "object"

eval:
  suite: "evals/"
  required_pass_rate: 0.85
  golden_dataset: "uc:brickvision.evals.uc_grant_recommend_v0_1"
  scorers:
    - "Correctness"
    - "Guidelines:least-privilege"
    - "Guidelines:no-redundant-grants"
    - "Guidelines:must-cite-evidence"
    - "Guidelines:no-fabricated-securables"
    - "RetrievalGroundedness"
    - "Safety"

execution:
  runtime: "serverless"
  human_in_the_loop:
    required: true
    suggested_approver_group: "group:uc-admins"
    approval_ttl_minutes: 60
