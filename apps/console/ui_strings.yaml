# BrickVision Console — partner-facing string table (N109).
#
# Single source of truth for partner-mode console copy; seeded
# from the canonical translation table in
# docs/12-visual-builder.md §10.6. Every console surface
# references entries here via ui_strings.lookup(surface, string_id);
# inlining partner-facing copy in JSX is forbidden (P9 — vocabulary
# discipline). The VocabularyAccessibility() scorer (N110) lints
# this file + every rendered surface to confirm:
#
#   1. Every internal symbol that surfaces on a console route
#      has an entry here.
#   2. The primary copy (`primary` field) is plain language; the
#      internal symbol (`secondary_symbol` field) appears as the
#      muted parenthesised secondary token only.
#   3. Reverse-orientation rows (symbol-as-headline) fail with
#      VOCAB_INTERNAL_VOCAB_AS_PRIMARY.
#
# Schema:
#   <surface_id>:
#     <string_id>:
#       primary: "..."          # the headline copy
#       secondary_symbol: "..."  # OPTIONAL: the muted symbol token
#       internal_symbols:        # block-style sequence of bare strings
#         - "..."
#         - "..."

